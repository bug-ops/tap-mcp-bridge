---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly dependency check every Sunday at midnight
    - cron: '0 0 * * 0'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10
  RUST_VERSION: "1.94"

# Cancel previous runs on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quick lint pass: fmt + clippy + rustdoc + doctests on a single runner.
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-check"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "--deny rustdoc::broken_intra_doc_links -D warnings"

      - name: Run doctests
        run: cargo test --doc --all-features

  # Security and license compliance
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-deny"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Scan for vulnerabilities
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

  # MSRV check (matches workspace.package.rust-version)
  msrv:
    name: Check MSRV
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "${{ env.RUST_VERSION }}"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-msrv"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: cargo check (MSRV, --all-features --locked)
        run: cargo check --workspace --all-targets --all-features --locked

  # Feature combination testing
  feature-testing:
    name: Feature Combinations
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-features"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack

      - name: Check all feature combinations
        run: cargo hack check --feature-powerset

  # Unused dependency check
  dependencies:
    name: Check Dependencies
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-udeps"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install cargo-udeps
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps

      - name: Check for unused dependencies
        run: cargo udeps --all-targets

  # Build a per-OS nextest archive once with sccache, then reuse it in `test`.
  build-tests:
    name: Build Tests (${{ matrix.os }})
    needs: [check]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      # cache-targets: false because sccache already caches build artifacts —
      # leaving target/ out of the action prevents the two caches from clashing.
      - name: Cache Cargo (registry only)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-build-${{ matrix.os }}"
          cache-targets: "false"
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build and archive tests
        shell: bash
        run: |
          cargo nextest archive \
            --config-file .github/nextest.toml \
            --cargo-profile ci \
            --workspace \
            --all-features \
            --lib --bins --tests \
            --archive-file nextest-archive.tar.zst

      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-${{ matrix.os }}
          path: nextest-archive.tar.zst
          retention-days: 1

      # Reuse the same compilation pass for the docker job: nextest archive
      # also leaves target/ci/tap-mcp-server on the runner.
      - name: Upload server binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tap-mcp-server-binary
          path: target/ci/tap-mcp-server
          retention-days: 1

      - name: Print sccache stats
        if: always()
        run: sccache --show-stats

  # Run the prebuilt archive on every supported OS — no Cargo cache required.
  test:
    name: Test (${{ matrix.os }})
    needs: [build-tests]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive-${{ matrix.os }}

      - name: Run tests
        shell: bash
        run: |
          cargo nextest run \
            --config-file .github/nextest.toml \
            --archive-file nextest-archive.tar.zst \
            --workspace-remap . \
            --profile ci

  # Coverage runs on master only — instrumented builds invalidate sccache hits
  # for normal builds, so we keep its target out of the shared cache.
  coverage:
    name: Coverage
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      # -D warnings would promote workspace lints to errors during the
      # instrumented build; linting is enforced by the `check` job.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Cargo (registry only)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-coverage"
          cache-targets: "false"

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Generate coverage
        run: |
          cargo llvm-cov nextest \
            --config-file .github/nextest.toml \
            --cargo-profile ci \
            --workspace \
            --all-features \
            --lib --bins \
            --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: Print sccache stats
        if: always()
        run: sccache --show-stats

  # Build the docker image from the prebuilt server binary and scan it with
  # Trivy. SARIF output is uploaded to the GitHub Security tab.
  docker-build-and-scan:
    name: Docker Build and Security Scan
    needs: [check, build-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: tap-mcp-server-binary
          path: docker/

      - name: Restore binary executable bit
        run: chmod +x docker/tap-mcp-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/Dockerfile
          load: true
          push: false
          tags: tap-mcp-server:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        # Trivy exits 1 when findings are present; without continue-on-error
        # the SARIF upload would be skipped and findings lost.
        continue-on-error: true
        with:
          image-ref: tap-mcp-server:local
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # Aggregate gate
  ci-success:
    name: CI Success
    needs:
      - check
      - security
      - msrv
      - feature-testing
      - dependencies
      - build-tests
      - test
      - coverage
      - docker-build-and-scan
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check all jobs
        run: |
          results=(
            "${{ needs.check.result }}"
            "${{ needs.security.result }}"
            "${{ needs.msrv.result }}"
            "${{ needs.feature-testing.result }}"
            "${{ needs.dependencies.result }}"
            "${{ needs.build-tests.result }}"
            "${{ needs.test.result }}"
            "${{ needs.coverage.result }}"
            "${{ needs.docker-build-and-scan.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "All jobs passed"
